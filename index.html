<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính tiền </title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial;
  margin: 0;
  padding: 30px;

  /* 🌄 Background full */
  background-image: url("https://pixpretty.tenorshare.ai/inspiration/15.png?w=5475&h=2993");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* 🌫 overlay tối cho dễ nhìn */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: rgba(243, 242, 238, 0.9);
  padding: 20px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

h2 {
  text-align: center;
}

.form {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.form input {
  padding: 8px;
  flex: 1;
}

button {
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #e6005c;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

th {
  background: #333;
  color: white;
}

input.qty {
  width: 60px;
}

.total-box {
  text-align: right;
  font-size: 22px;
  margin-top: 15px;
  color: #d63384;
}
</style>
</head>

<body>

<div class="container">
  <h2>💸 Tinh Tiền</h2>

  <div class="form">
    <input id="ten" placeholder="Tên sản phẩm">
    <input id="gia" type="number" placeholder="Đơn giá">
    <button onclick="themSanPham()">Thêm</button>
    <button onclick="resetAll()">Reset</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tên</th>
        <th>Giá</th>
        <th>SL</th>
        <th>Thành tiền</th>
        <th>Xoá</th>
      </tr>
    </thead>

    <tbody id="table-body"></tbody>
  </table>

  <div class="total-box">
    Tổng: <span id="tong">0</span> đ
  </div>
</div>
<button onclick="window.open('https://xosodaiphat.com/xsmn-xo-so-mien-nam.html', '_blank')">
  🔗 kết quả só xố
</button>

<script>
function format(n) {
  return Number(n).toLocaleString("vi-VN");
}

function tinhTien() {
  let tong = 0;

  document.querySelectorAll("#table-body tr").forEach(row => {
    const gia = Number(row.querySelector(".gia").innerText);
    const sl = Number(row.querySelector(".qty").value);

    const thanhTien = gia * sl;
    row.querySelector(".tt").innerText = format(thanhTien);

    row.style.background = sl > 0 ? "#fff0f6" : "";

    tong += thanhTien;
  });

  document.getElementById("tong").innerText = format(tong);
  save();
}

function themSanPham() {
  const ten = document.getElementById("ten").value.trim();
  const gia = document.getElementById("gia").value;

  if (!ten || !gia || gia <= 0) {
    alert("Nhập sai!");
    return;
  }

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td class="ten"></td>
    <td class="gia"></td>
    <td><input class="qty" type="number" value="0" min="0"></td>
    <td class="tt">0</td>
    <td><button class="xoa">❌</button></td>
  `;

  tr.querySelector(".ten").innerText = ten;
  tr.querySelector(".gia").innerText = gia;

  tr.querySelector(".qty").addEventListener("input", tinhTien);

  tr.querySelector(".xoa").onclick = () => {
    tr.remove();
    tinhTien();
  };

  document.getElementById("table-body").appendChild(tr);

  document.getElementById("ten").value = "";
  document.getElementById("gia").value = "";

  save();
}

function resetAll() {
  if (confirm("Xoá hết dữ liệu?")) {
    localStorage.removeItem("pos_data");
    location.reload();
  }
}

function save() {
  localStorage.setItem("pos_data", document.getElementById("table-body").innerHTML);
}

function load() {
  const data = localStorage.getItem("pos_data");
  if (data) {
    document.getElementById("table-body").innerHTML = data;

    document.querySelectorAll(".qty").forEach(input => {
      input.addEventListener("input", tinhTien);
    });

    document.querySelectorAll(".xoa").forEach(btn => {
      btn.onclick = () => {
        btn.closest("tr").remove();
        tinhTien();
      };
    });

    tinhTien();
  }
}

load();
</script>

</body>
</html>
