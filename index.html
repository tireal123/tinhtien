<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tính tiền</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  margin: 0;
  padding: 15px;

  background-image: url("https://pixpretty.tenorshare.ai/inspiration/15.png?w=5475&h=2993");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

.container {
  max-width: 500px;
  margin: auto;
  background: rgba(255,255,255,0.95);
  padding: 15px;
  border-radius: 12px;
}

h2 {
  text-align: center;
  font-size: 20px;
}

/* 📱 FORM DỌC (quan trọng) */
.form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form input {
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

button:active {
  transform: scale(0.97);
}

/* 📱 TABLE CUỘN NGANG */
.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  min-width: 400px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
  text-align: center;
}

th {
  background: #333;
  color: white;
}

input.qty {
  width: 60px;
}

.total-box {
  text-align: right;
  font-size: 20px;
  margin-top: 10px;
  color: #d63384;
}

/* 🎯 NÚT LINK */
.link-box {
  margin-top: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>💸 Tính Tiền</h2>

  <div class="form">
    <input id="ten" placeholder="Tên sản phẩm">
    <input id="gia" type="number" placeholder="Đơn giá">

    <button onclick="themSanPham()">➕ Thêm sản phẩm</button>
    <button onclick="resetAll()">🔄 Reset</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tên</th>
          <th>Giá</th>
          <th>SL</th>
          <th>Tiền</th>
          <th>X</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="total-box">
    Tổng: <span id="tong">0</span> đ
  </div>

  <div class="link-box">
    <a href="https://xosodaiphat.com/xsmn-xo-so-mien-nam.html" target="_blank">
      <button>🎲 Xem xổ số</button>
    </a>
  </div>
</div>

<script>
function format(n) {
  return Number(n).toLocaleString("vi-VN");
}

function tinhTien() {
  let tong = 0;

  document.querySelectorAll("#table-body tr").forEach(row => {
    const gia = Number(row.querySelector(".gia").innerText);
    const sl = Number(row.querySelector(".qty").value);

    const tt = gia * sl;
    row.querySelector(".tt").innerText = format(tt);

    row.style.background = sl > 0 ? "#fff0f6" : "";
    tong += tt;
  });

  document.getElementById("tong").innerText = format(tong);
  save();
}

function themSanPham() {
  const ten = document.getElementById("ten").value.trim();
  const gia = document.getElementById("gia").value;

  if (!ten || !gia || gia <= 0) {
    alert("Nhập sai!");
    return;
  }

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${ten}</td>
    <td class="gia">${gia}</td>
    <td><input class="qty" type="number" value="0"></td>
    <td class="tt">0</td>
    <td><button class="xoa">❌</button></td>
  `;

  tr.querySelector(".qty").addEventListener("input", tinhTien);

  tr.querySelector(".xoa").onclick = () => {
    tr.remove();
    tinhTien();
  };

  document.getElementById("table-body").appendChild(tr);

  document.getElementById("ten").value = "";
  document.getElementById("gia").value = "";

  save();
}

function resetAll() {
  if (confirm("Xoá hết số lượng tất cả sản phẩm?")) {
    document.querySelectorAll(".qty").forEach(input =>{});
  tinhTien();
  }
}

function save() {
  localStorage.setItem("pos_data", document.getElementById("table-body").innerHTML);
}

function load() {
  const data = localStorage.getItem("pos_data");
  if (data) {
    document.getElementById("table-body").innerHTML = data;

    document.querySelectorAll(".qty").forEach(i =>
      i.addEventListener("input", tinhTien)
    );

    document.querySelectorAll(".xoa").forEach(btn =>
      btn.onclick = () => {
        btn.closest("tr").remove();
        tinhTien();
      }
    );

    tinhTien();
  }
}

load();
</script>

</body>
</html>
